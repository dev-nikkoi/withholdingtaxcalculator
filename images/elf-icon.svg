<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 64 64" role="img" aria-label="Elf icon">
  <title>Elf icon</title>
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffd4ea"/>
      <stop offset="100%" stop-color="#ff9ecf"/>
    </linearGradient>
  </defs>
  <!-- background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#g)" />
  <!-- hat -->
  <path d="M10 30 C20 8, 44 8, 54 30 L32 22 Z" fill="#8fd6a2" stroke="#6fc38a" stroke-width="0.6" />
  <!-- ear points -->
  <path d="M12 34 L8 30 L12 28" fill="#ffd4ea" opacity="0.9" />
  <path d="M52 34 L56 30 L52 28" fill="#ffd4ea" opacity="0.9" />
  <!-- face -->
  <ellipse cx="32" cy="36" rx="14" ry="10" fill="#fff7fb" />
  <!-- eyes -->
  <circle cx="26" cy="36" r="1.6" fill="#3d1f38" />
  <circle cx="38" cy="36" r="1.6" fill="#3d1f38" />
  <!-- smile -->
  <path d="M24 42 C28 46, 36 46, 40 42" stroke="#b44b8a" stroke-width="0.9" fill="none" stroke-linecap="round" />
</svg>
